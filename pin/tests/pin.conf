[engine]
static_root_path = /var/app/tests/static

[engine.pin]
servs = ./servs.yaml

[app]
template_path = ./static/tpl

[mysql]
host = engine.test.mysql
port = 3306
db = db_test
user = test
passwd = test
mincached = 1
maxcached = 1
maxconnections = 1
maxshared = 1
blocking = 1
ping = select 1

[redis]
host = engine.test.redis
port = 6379
max_connections = 1
decode_responses = True
