version: '3'
services:
  engine-common: &engine-common
    build:
      context: ../../engine
      dockerfile: ./docker/Dockerfile.centos8
      args:
        - nginx_version=1.19.3
    ports:
      - "8080:8080"
    environment:
        - C_INCLUDE_PATH=/usr/include/python3.6m
        - PYTHONPATH=/var:${PYTHONPATH}

  test-c:
    <<: *engine-common
    container_name: engine.test.c
    volumes:
      - ~/code/engine:/var/engine
    command:
      - /bin/bash
      - -c
      - |
        ./configure --with-debug \
          --prefix=/usr/local/nginx \
          --add-module=/var/engine/engine \
          --with-ld-opt="`python3.6-config --ldflags`"
        cd /var/engine/tests/testc
        rm -rf *.o
        make
        ./alltests
        tail -f /dev/null

  test-helloworld:
    <<: *engine-common
    container_name: engine.test.helloworld
    volumes:
      - ..:/var/engine
      - ./apps:/var/app
    command:
      - /bin/bash
      - -c 
      - |
        ./configure --with-debug \
          --prefix=/usr/local/nginx \
          --add-module=/var/engine/engine \
          --with-ld-opt="`python3.6-config --ldflags`"
        make
        make install
        mkdir -p /usr/local/nginx/logs
        touch /usr/local/nginx/logs/debug.log
        /usr/local/nginx/sbin/nginx -c /var/engine/tests/ngx-conf/nginx.conf
        cd /var/engine/tests
        pip3 install pytest requests
        pytest -v test_helloworld.py || cat /usr/local/nginx/logs/debug.log
